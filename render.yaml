services:
  - type: web
    name: gojo-sentinel
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: API_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10
