services:
  - type: web
    name: gojo-sentinel
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -k uvicorn.workers.UvicornWorker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gojo-db
          property: connectionString
      - key: API_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: gojo-db
    plan: free
